name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 8s
          --health-timeout 5s
          --health-retries 6

    env:
      JWT_SECRET_KEY: ci-test-secret-jwt-key-32-characters!!!!
      APP_ENV: development
      # Plano ANALISE §B1 — Postgres local para integration (WORM, API ASGI).
      QDI_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Migrar Postgres (ordem lexical migrations)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls src/infrastructure/db/migrations/*.sql | sort); do
            echo "migrate: $f"
            psql "$QDI_POSTGRES_TEST_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar pacote em modo editável + dev-deps
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/

      - name: Pytest (unit + integration)
        run: PYTHONPATH=. pytest

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint (Next.js)
        run: npm run lint
      - name: Playwright (Chromium apenas)
        run: npx playwright install --with-deps chromium
      - name: E2E
        env:
          CI: true
        run: npm run test:e2e
