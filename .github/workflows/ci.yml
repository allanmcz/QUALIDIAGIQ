name: CI

on:
  push:
    branches: [main, master, "release/**"]
    tags: ["v*", "mvp-*"]
  pull_request:
    branches: [main, master, "release/**"]

# Novos pushes no mesmo PR/ref cancelam execuções antigas (economiza minutos na fila).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 8s
          --health-timeout 5s
          --health-retries 6

    env:
      JWT_SECRET_KEY: ci-test-secret-jwt-key-32-characters!!!!
      APP_ENV: development
      # Plano ANALISE §B1 — Postgres local para integration (WORM, API ASGI).
      QDI_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
      # Quando definido, o job executa `scripts/verify_mvp_schema.py` em modo strict (0015 + CNAE).
      POSTGRES_CI_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Lockfile Python alinhado (uv.lock)
        run: uv lock --check

      - name: Migrar Postgres (ordem lexical migrations)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls src/infrastructure/db/migrations/*.sql | sort); do
            echo "migrate: $f"
            psql "$QDI_POSTGRES_TEST_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar pacote em modo editável + dev-deps
        run: pip install -e ".[dev]"

      - name: SBOM CycloneDX (Python — artefacto)
        run: |
          mkdir -p dist
          cyclonedx-py environment -o dist/sbom-cyclonedx.json --pyproject pyproject.toml -of JSON

      - uses: sigstore/cosign-installer@v3.8.0

      - name: Assinar SBOM com Cosign (keyless — OIDC GitHub)
        id: cosign_sbom
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature=dist/sbom-cyclonedx.json.sig \
            --output-certificate=dist/sbom-cyclonedx.json.cert.pem \
            --bundle=dist/sbom-cyclonedx.json.bundle \
            dist/sbom-cyclonedx.json

      - name: Artefacto SBOM CycloneDX
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: sbom-cyclonedx-json
          path: dist/sbom-cyclonedx.json
          retention-days: 30

      - name: Artefacto assinaturas Cosign (SBOM)
        if: ${{ hashFiles('dist/sbom-cyclonedx.json.sig') != '' }}
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: sbom-cyclonedx-cosign
          path: |
            dist/sbom-cyclonedx.json.sig
            dist/sbom-cyclonedx.json.cert.pem
            dist/sbom-cyclonedx.json.bundle
          retention-days: 30

      - name: Schema MVP strict (Postgres — 0015 + CNAE)
        if: ${{ env.POSTGRES_CI_URL != '' }}
        env:
          QDI_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
          QDI_VERIFY_SCHEMA_STRICT_CNAE: "1"
        run: python scripts/verify_mvp_schema.py

      - name: Schema RAG-light (0020 — extensão vector + qdi_rag)
        if: ${{ env.POSTGRES_CI_URL != '' }}
        env:
          QDI_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
          QDI_VERIFY_SCHEMA_RAG: "1"
        run: python scripts/verify_mvp_schema.py

      - name: Ruff (lint)
        run: ruff check src/ tests/ scripts/

      - name: Bandit (análise estática segurança Python)
        run: bandit -r src -ll -ii -x tests/

      - name: Semgrep (regras CI — código Python)
        continue-on-error: true
        run: |
          pip install "semgrep>=1.45.0"
          semgrep scan --config p/ci --error src/

      - name: Trivy (filesystem — dependências e código)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: src
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Black (formato — apenas verificação)
        run: black --check src/ tests/ scripts/

      - name: Instalar ripgrep (audit-secrets)
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: Auditoria segredos (S-01)
        run: bash scripts/audit_secrets.sh

      - name: Mypy
        run: mypy src/

      - name: Pytest (unit + integration)
        run: PYTHONPATH=. pytest --cov-report=xml:coverage.xml

      - name: OpenAPI versionado sem drift (make openapi-export)
        run: |
          PYTHONPATH=. python scripts/export_openapi_json.py
          git diff --exit-code docs/api/openapi.generated.json || (
            echo "::error::docs/api/openapi.generated.json desatualizado — execute make openapi-export e faça commit"
            exit 1
          )

      - name: Artefacto cobertura backend (XML + HTML)
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: coverage-backend
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      # Repositório privado: definir secret CODECOV_TOKEN em GitHub → Settings → Secrets.
      # Repositório público: upload costuma funcionar sem token (ver documentação Codecov).
      - name: Codecov (upload coverage.xml)
        if: ${{ always() && hashFiles('coverage.xml') != '' }}
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
          name: qualidiagiq-backend
          fail_ci_if_error: false

      - name: Auditoria catálogo MVP (G1 — invariantes JSON)
        run: PYTHONPATH=. python scripts/auditoria_catalogo_perguntas_mvp.py

      # Alinhado a ``make test-domain`` (branches + fail_under 100 só em src/domain).
      - name: Cobertura domain (statements + branches, 100%)
        run: |
          PYTHONPATH=. coverage run --branch --source=src/domain -m pytest -o addopts= -p no:cov tests/unit/domain -q
          coverage report --include='src/domain/*' --fail-under=100 --show-missing

  go-live-readiness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 8s
          --health-timeout 5s
          --health-retries 6
    env:
      JWT_SECRET_KEY: ci-test-secret-jwt-key-32-characters!!!!
      APP_ENV: development
      QDI_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      QDI_API_BASE_URL: http://127.0.0.1:8765
      QDI_GO_LIVE_SKIP_SCHEMA: "0"
      QDI_GO_LIVE_RUN_E2E: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Migrar Postgres (ordem lexical migrations)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client curl
          for f in $(ls src/infrastructure/db/migrations/*.sql | sort); do
            echo "migrate: $f"
            psql "$QDI_POSTGRES_TEST_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar pacote em modo editável + dev-deps
        run: pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências frontend
        working-directory: frontend
        run: npm ci

      - name: Subir API (background)
        run: |
          PYTHONPATH=. uvicorn src.presentation.api.main:app --host 127.0.0.1 --port 8765 &
          for i in $(seq 1 45); do
            curl -sf "$QDI_API_BASE_URL/health" && exit 0
            sleep 1
          done
          echo "API não respondeu a tempo"; exit 1

      - name: Gate go-live (~45min) sem E2E
        run: make go-live

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint (Next.js)
        run: npm run lint
      - name: Build Next.js (tipagem e páginas estáticas)
        run: npm run build
      - name: Playwright (Chromium apenas)
        run: npx playwright install --with-deps chromium
      - name: E2E
        env:
          CI: true
        run: npm run test:e2e

  frontend-lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build produção (sem service worker — CI=true)
        env:
          CI: true
        run: npm run build
      - name: Lighthouse CI (home — a11y/SEO/best-practices)
        run: npm run lighthouse

  frontend-e2e-integrado:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 8s
          --health-timeout 5s
          --health-retries 6
    env:
      JWT_SECRET_KEY: ci-test-secret-jwt-key-32-characters!!!!
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      QDI_CI_PLAYWRIGHT_INTEGRATED: "1"
      PLAYWRIGHT_INTEGRATED: "1"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      PLAYWRIGHT_PORT: "3333"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3333
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8765
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Migrar Postgres (ordem lexical migrations)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client curl
          export QDI_POSTGRES_TEST_URL=postgresql://postgres:postgres@localhost:5432/postgres
          for f in $(ls src/infrastructure/db/migrations/*.sql | sort); do
            echo "migrate: $f"
            psql "$QDI_POSTGRES_TEST_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar pacote em modo editável + dev-deps
        run: pip install -e ".[dev]"

      - name: Subir API (background)
        run: |
          PYTHONPATH=. uvicorn src.presentation.api.main:app --host 127.0.0.1 --port 8765 &
          for i in $(seq 1 45); do
            curl -sf http://127.0.0.1:8765/health && exit 0
            sleep 1
          done
          echo "API não respondeu a tempo"; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci + Next dev (background)
        working-directory: frontend
        run: |
          npm ci
          npm run dev -- -p 3333 &
          for i in $(seq 1 45); do
            curl -sf http://127.0.0.1:3333/ >/dev/null && exit 0
            sleep 2
          done
          echo "Next não respondeu a tempo"; exit 1

      - name: Playwright integrado + axe (Chromium)
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npx playwright test \
            e2e/dashboard-list-integrado.spec.ts \
            e2e/dashboard-privacidade-export.spec.ts \
            e2e/a11y-critical.spec.ts
