# Dependabot — atualizações de segurança e compatibilidade (semanal).
# PRs gerados devem passar no CI (pytest, ruff, mypy, etc.).

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - python

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - ci

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - frontend
