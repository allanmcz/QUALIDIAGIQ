# docker-compose.yml — Ambiente de desenvolvimento local QDI
# Stack: PostgreSQL (Supabase-compatible) + FastAPI + Next.js
# Use: make dev  ou  docker compose up -d

services:
  db:
    image: supabase/postgres:15.6.1.146
    container_name: qdi-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "60322:5432"
    volumes:
      - qdi-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_qdi_bootstrap.sql
      - ./src/infrastructure/db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qdi-network

  # SMTP de desenvolvimento — a API no container deve usar SMTP_HOST=mailpit (não localhost).
  mailpit:
    image: axllent/mailpit:latest
    container_name: qdi-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - qdi-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qdi-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_ENV: development
      APP_RELOAD: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      # Next no compose exposto em :60001 — precisa constar no CORS (senão fetch → "Failed to fetch").
      CORS_ALLOWED_ORIGINS: http://localhost:3010,http://127.0.0.1:3010,http://localhost:60001,http://127.0.0.1:60001,http://localhost:3333,http://127.0.0.1:3333
      # :- evita WARN do Compose quando as variáveis não existem no host (LLM é opcional em dev).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "60000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    networks:
      - qdi-network
    command: ["uvicorn", "src.presentation.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    image: node:20-alpine
    container_name: qdi-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    working_dir: /app
    ports:
      - "60001:3010"
    # Web: proxy same-origin (/api-backend → api:8000). NEXT_PUBLIC_* vem do Compose; no host (npm run dev) use .env.local se precisar.
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_PUBLIC_API_URL: /api-backend
    volumes:
      - ./frontend:/app
    networks:
      - qdi-network
    command:
      [
        "sh",
        "-c",
        "if [ -f package.json ]; then npm install && npm run dev -- -H 0.0.0.0 -p 3010; else echo 'frontend ainda nao inicializado — rode: cd frontend && npx create-next-app@14 . --ts --tailwind --app'; tail -f /dev/null; fi",
      ]

volumes:
  qdi-db-data:

networks:
  qdi-network:
    driver: bridge
