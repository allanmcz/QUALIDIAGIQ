# docker-compose.yml — Ambiente de desenvolvimento local QDI
# Stack: PostgreSQL 16 (mesma imagem base do CI) + FastAPI + Next.js
# Use: make dev  ou  docker compose up -d

services:
  db:
    # Postgres 16 + pgvector — alinhado ao CI e à migração 0020 (RAG-light).
    image: pgvector/pgvector:pg16
    container_name: qdi-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "60322:5432"
    volumes:
      - qdi-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_qdi_bootstrap.sql
      - ./src/infrastructure/db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qdi-network

  # SMTP de desenvolvimento — a API no container deve usar SMTP_HOST=mailpit (não localhost).
  mailpit:
    image: axllent/mailpit:latest
    container_name: qdi-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - qdi-network

  # LLM local (ADR-007) — stack LangGraph + ChatOllama na API.
  # Primeira inferência pode demorar (pull automático do modelo); ou: make ollama-pull
  ollama:
    image: ollama/ollama:latest
    container_name: qdi-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - qdi-ollama-data:/root/.ollama
    networks:
      - qdi-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qdi-api
    restart: unless-stopped
    # Dockerfile usa USER qdiapp; o volume nomeado monta `/tmp/qdi-mock-pdf` como root.
    # Sem root, `chmod 1777` no command falha (Operation not permitted) e o uvicorn não arranca.
    # Em desenvolvimento local isto é aceitável — produção deve usar permissões/imagem adequadas.
    user: "0:0"
    # Ollama no host (Mac/Windows/Linux): o container alcança via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      APP_ENV: development
      APP_RELOAD: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      # Login lê `admins` no Postgres (sync_database_url). Com DATABASE_URL, diagnósticos persistem na
      # tabela `diagnosticos` do mesmo Postgres. Para usar só Supabase PostgREST (sem SQL direto no PG),
      # crie `.env` com QDI_CI_PLAYWRIGHT_INTEGRATED=0, sem DATABASE_URL na API, e SUPABASE_* reais.
      QDI_CI_PLAYWRIGHT_INTEGRATED: "${QDI_CI_PLAYWRIGHT_INTEGRATED:-1}"
      # create_client exige chave não vazia; upload ao storage pode falhar → adapter devolve URL mock (ver storage_supabase.py).
      SUPABASE_URL: "${SUPABASE_URL:-http://127.0.0.1:54321}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InFkai1sb2NhbC1jb21wb3NlIn0.local-dev-placeholder}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-dev-docker-compose-qdi-jwt-secret-min-32-chars!!}"
      # Links PDF no e-mail / mock-storage — porta publicada da API no host (não use http://api:8000).
      QDI_PUBLIC_API_BASE_URL: "${QDI_PUBLIC_API_BASE_URL:-http://127.0.0.1:60000}"
      QDI_SELF_SERVICE_TENANT_ID: "${QDI_SELF_SERVICE_TENANT_ID:-44444444-4444-4444-8444-444444444444}"
      QDI_SELF_SERVICE_JWT_EXPIRE_MINUTES: "${QDI_SELF_SERVICE_JWT_EXPIRE_MINUTES:-30}"
      # Next no compose exposto em :60001 — precisa constar no CORS (senão fetch → "Failed to fetch").
      CORS_ALLOWED_ORIGINS: http://localhost:3010,http://127.0.0.1:3010,http://localhost:3000,http://127.0.0.1:3000,http://localhost:60001,http://127.0.0.1:60001,http://localhost:3333,http://127.0.0.1:3333
      # Ollama no compose (default). Para Ollama só no Mac: OLLAMA_BASE_URL=http://host.docker.internal:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      # Gateway ADR-022 activo em dev — explicacao-score-llm e /health/llm coerentes.
      LLM_ROUTER_ENABLED: ${LLM_ROUTER_ENABLED:-true}
      LLM_ROUTER_POLICY_VERSION: ${LLM_ROUTER_POLICY_VERSION:-2026-05-15-v1}
      # :- evita WARN do Compose quando as variáveis não existem no host (LLM é opcional em dev).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LGPD_DPO_EMAIL: "${LGPD_DPO_EMAIL:-allan@tributolab.com.br}"
      LGPD_RETENTION_DAYS: "${LGPD_RETENTION_DAYS:-180}"
    ports:
      - "60000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      # Fallback PDF (upload Storage falhou em dev): persiste entre restarts da API no mesmo stack.
      - qdi-mock-pdf-spool:/tmp/qdi-mock-pdf
    networks:
      - qdi-network
    # Mesma estratégia do Dockerfile (python:slim sem curl): httpx já é dependência do pacote.
    # Evita race: `web` só sobe quando /health responde (uvicorn a ouvir).
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://127.0.0.1:8000/health', timeout=3).raise_for_status()",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 45s
    command:
      [
        "sh",
        "-c",
        "mkdir -p /tmp/qdi-mock-pdf && chmod 1777 /tmp/qdi-mock-pdf && exec uvicorn src.presentation.api.main:app --host 0.0.0.0 --port 8000 --reload",
      ]

  web:
    image: node:20-alpine
    container_name: qdi-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    working_dir: /app
    ports:
      - "60001:3010"
    # Web: proxy same-origin (/api-backend → api:8000). NEXT_PUBLIC_* vem do Compose; no host (npm run dev) use .env.local se precisar.
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_PUBLIC_API_URL: /api-backend
      NEXT_PUBLIC_LGPD_DPO_EMAIL: allan@tributolab.com.br
      NEXT_PUBLIC_LGPD_DPO_NOME: "Allan Marcio"
    volumes:
      # Código-fonte no host; dependências e cache de build só no Linux do container.
      # Sem isto, `node_modules`/`.next` gerados no macOS misturam-se com `npm run dev` no Alpine
      # e o browser recebe chunks truncados/HTML → «layout.js: Invalid or unexpected token».
      # Volumes **nomeados** (não anónimos `/app/...`) — evita acumular volumes órfãos a cada recreate do container.
      - ./frontend:/app
      - qdi-web-node-modules:/app/node_modules
      - qdi-web-next-cache:/app/.next
    networks:
      - qdi-network
    command:
      [
        "sh",
        "-c",
        "if [ -f package.json ]; then npm install && npm run dev -- -H 0.0.0.0; else echo 'frontend ainda nao inicializado — rode: cd frontend && npx create-next-app@14 . --ts --tailwind --app'; tail -f /dev/null; fi",
      ]

volumes:
  qdi-db-data:
  qdi-ollama-data:
  qdi-mock-pdf-spool:
  qdi-web-node-modules:
  qdi-web-next-cache:

networks:
  qdi-network:
    driver: bridge
